<!DOCTYPE html>
<html>
<head>
  <title>Bonsai Login</title>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <style>
    body {
      background: #111;
      color: white;
      text-align: center;
      padding-top: 50px;
    }
    input {
      display: block;
      margin: 10px auto;
      padding: 10px;
    }
    button {
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h2>BONSAI LOGIN</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>

<p id="msg"></p>

<script>
// Import the functions you need from the SDKs you need
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyA2P3yh0o-Jr2zCDkFxBg4YTrFSTpeS8P0",
  authDomain: "bonsaipi224.firebaseapp.com",
  databaseURL: "https://bonsaipi224-default-rtdb.firebaseio.com",
  projectId: "bonsaipi224",
  storageBucket: "bonsaipi224.firebasestorage.app",
  messagingSenderId: "818801429743",
  appId: "1:818801429743:web:27ed0c854b8be5c8a95f1a"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function register() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, pass)
      .then(() => {
        document.getElementById("msg").innerText = "Đăng ký thành công";
      })
      .catch(err => {
        document.getElementById("msg").innerText = err.message;
      });
  }

  function login() {
    const email = document.getElementById("email").value;
    const pass = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, pass)
      .then(() => {
        document.getElementById("msg").innerText = "Đăng nhập OK";
      })
      .catch(err => {
        document.getElementById("msg").innerText = err.message;
      });
  }
</script>

</body>
</html>
