<div id="auth-box" style="text-align: center; background-color: #1a472a; color: white; padding: 30px; border-radius: 15px;">
    <h1>🌳 BONSAI PI 99 🌳</h1>
    <p>Hệ thống quản lý vườn kiểng</p>
    <input type="email" id="email" placeholder="Nhập Gmail nghệ nhân"><br><br>
    <input type="password" id="password" placeholder="Mật khẩu bảo mật"><br><br>
    <button onclick="dangKy()" style="background: #ffc107; padding: 10px;">ĐĂNG KÝ HỘI VIÊN</button>
    <button onclick="dangNhap()" style="background: #28a745; color: white; padding: 10px;">VÀO VƯỜN</button>
</div>

<div id="game-lobby" style="display: none; text-align: center;">
    <h2>✅ ĐÃ VÀO VƯỜN THÀNH CÔNG</h2>
    <p id="wel-msg"></p>
    <div style="border: 2px solid #28a745; padding: 20px; margin: 10px;">
        <p>Số dư tài khoản: <span id="balance">0</span> Pi</p>
        <button onclick="napPi()" style="background: #ffc107; font-weight: bold;">NẠP 10 PI ĐỂ CHĂM CÂY</button>
    </div>
    <button onclick="dangXuat()">RỜI VƯỜN</button>
</div>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// 2. Dán chìa khóa Firebase mầy vừa lấy vào đây
const firebaseConfig = {
  apiKey: "AIzaSyBc4oPPt2AQdn6AW85DRpQSIuMyK1oJDlQ",
  authDomain: "bonsaipi99.firebaseapp.com",
  databaseURL: "https://bonsaipi99-default-rtdb.firebaseio.com",
  projectId: "bonsaipi99",
  storageBucket: "bonsaipi99.firebasestorage.app",
  messagingSenderId: "119041490462",
  appId: "1:119041490462:web:5635dc57b3eb6b49afb80f",
  measurementId: "G-W7XQKDGW6X"
};

// Khởi tạo
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// 3. Hàm Đăng Ký
function dangKy() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    
    if(!email || !pass) return alert("Nhập đủ Gmail với mật khẩu mậy ơi!");

    auth.createUserWithEmailAndPassword(email, pass)
        .then((userCredential) => {
            // Lưu Gmail vào Database để không bị mất số dư
            db.ref('users/' + userCredential.user.uid).set({
                gmail: email,
                balance: 0
            });
            alert("Đăng ký thành công! Giờ mầy bấm VÀO VƯỜN nha.");
        })
        .catch((error) => alert("Lỗi rồi: " + error.message));
}

// 4. Hàm Đăng Nhập
function dangNhap() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;

    auth.signInWithEmailAndPassword(email, pass)
        .then((userCredential) => {
            document.getElementById('auth-box').style.display = 'none';
            document.getElementById('game-lobby').style.display = 'block';
            document.getElementById('wel-msg').innerText = "Chào nghệ nhân: " + email;
            
            // Lấy số dư từ Database hiện lên
            db.ref('users/' + userCredential.user.uid).once('value', (snapshot) => {
                document.getElementById('balance').innerText = snapshot.val().balance;
            });
        })
        .catch((error) => alert("Sai mật khẩu hoặc Gmail rồi Nhi ơi!"));
}

// 5. Hàm Đăng Xuất (Thoát là sạch sẽ)
function dangXuat() {
    auth.signOut().then(() => { location.reload(); });
}
</script>
