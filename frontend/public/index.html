<script>
    // 1. Dùng biến toàn cục để tránh lỗi "undefined"
    var Pi = window.Pi;

    window.onload = function () {
      var statusMsg = document.getElementById("status");
      
      if (!window.Pi) {
        statusMsg.innerText = "❌ Lỗi: Mở bằng Pi Browser nha mậy!";
        return;
      }

      try {
        // 2. ÉP KHỞI TẠO NGAY LẬP TỨC
        window.Pi.init({ version: "2.0", sandbox: false });
        console.log("SDK đã thức!");

        // 3. ĐỢI MỘT CHÚT RỒI MỚI ĐĂNG NHẬP (Tránh bị kẹt)
        setTimeout(function() {
          statusMsg.innerText = "🔄 Đang tìm ví nghệ nhân...";
          
          window.Pi.authenticate(['username', 'payments'], function(payment) {
            // Xử lý các thanh toán chưa hoàn tất
          })
          .then(function(auth) {
            statusMsg.innerText = "✅ Nghệ nhân: " + auth.user.username;
          })
          .catch(function(err) {
            statusMsg.innerText = "❌ Lỗi kết nối: " + err.message;
            console.error(err);
          });
        }, 1500); // Tăng thời gian chờ lên 1.5 giây cho chắc

      } catch (e) {
        statusMsg.innerText = "❌ Lỗi khởi tạo: " + e.message;
      }
    };

    function napPi() {
      var statusTxt = document.getElementById("status").innerText;
      if (!statusTxt.includes("Nghệ nhân")) {
        alert("Chưa hiện tên Nghệ nhân là chưa nạp được đâu Nhi!");
        return;
      }

      window.Pi.createPayment({
          amount: 10,
          memo: "Nap Pi Bonsai 99",
          metadata: { type: "deposit" }
      }, {
          onReadyForServerApproval: function(id) { 
            console.log("Đang duyệt lệnh: " + id);
            // Báo cho Server dùng PI_API_KEY để Approve
            fetch('/api/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ paymentId: id })
            });
          },
          onReadyForServerCompletion: function(id, tx) { alert("✅ Thành công rồi mậy!"); },
          onCancel: function() { alert("❌ Huỷ nạp"); },
          onError: function(err) { alert("❌ Lỗi nạp: " + err.message); }
      });
    }
  </script>
