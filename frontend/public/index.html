<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bonsai Pi</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { background:#111; color:white; text-align:center; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<h2>🌱 Bonsai Pi</h2>

<div id="auth">
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>
</div>

<div id="app" style="display:none;">
<p id="user"></p>
<p>Balance: <span id="balance">0</span> Pi</p>
<button onclick="pay()">Nạp 1 Pi</button>
<button onclick="logout()">Đăng xuất</button>
</div>

<script>
/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "kzvi6npd3ils0ho0xyqs2otg8bcfotam9bgnqkoeatwxibb69vvlwdj8ehsf9d1e",
  authDomain: "app.firebaseapp.com",
  databaseURL: "https://app-default-rtdb.firebaseio.com",
  projectId: "app",
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* PI INIT */
Pi.init({ version: "2.0", sandbox: true });

/* AUTH */
function register(){
  auth.createUserWithEmailAndPassword(val("email"), val("pass"))
  .then(res=>{
    db.ref("users/"+res.user.uid).set({balance:0});
    alert("OK");
  })
  .catch(e=>alert(e.message));
}

function login(){
  auth.signInWithEmailAndPassword(val("email"), val("pass"))
  .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
}

/* UI */
auth.onAuthStateChanged(user=>{
  if(user){
    show("app"); hide("auth");
    text("user","Xin chào: "+user.email);

    db.ref("users/"+user.uid+"/balance")
    .on("value",snap=>{
      text("balance", snap.val() || 0);
    });
  } else {
    show("auth"); hide("app");
  }
});

/* PAYMENT */
async function pay(){
  const user = auth.currentUser;
  if(!user) return alert("Chưa login");

  try{
    await Pi.createPayment({
      amount:1,
      memo:"Nap Pi",
      metadata:{uid:user.uid}
    },{
      onReadyForServerApproval: pid=>{
        console.log("approve", pid);
      },
      onReadyForServerCompletion:(pid,txid)=>{
        db.ref("users/"+user.uid+"/balance")
        .transaction(x=>(x||0)+1);
        alert("OK");
      },
      onCancel:()=>alert("Hủy"),
      onError:e=>alert(e.message)
    });
  }catch(e){
    alert(e.message);
  }
}

/* HELPER */
function val(id){ return document.getElementById(id).value }
function text(id,t){ document.getElementById(id).innerText=t }
function show(id){ document.getElementById(id).style.display="block" }
function hide(id){ document.getElementById(id).style.display="none" }

</script>
<script>
// 1. Khai báo chìa khóa (Nhi lấy cái apiKey thật của mầy dán vào đây nha)
const firebaseConfig = {
  apiKey: "AIZA...", 
  authDomain: "bonsaipi99.firebaseapp.com",
  databaseURL: "https://bonsaipi99-default-rtdb.firebaseio.com",
  projectId: "bonsaipi99",
  storageBucket: "bonsaipi99.firebasestorage.app",
  messagingSenderId: "119041498462",
  appId: "1:119041498462:web:5b35dc57bjeb6b49afb80f"
};

// 2. Nổ máy Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// 3. ĐÂY LÀ ĐOẠN "GHI NHỚ": Tự động vào vườn nếu đã đăng nhập
auth.onAuthStateChanged((user) => {
    if (user) {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('game-lobby').style.display = 'block';
        document.getElementById('wel-msg').innerText = "Chào nghệ nhân: " + user.email;
        
        // Tự lấy số dư từ Firebase hiện lên màn hình
        db.ref('users/' + user.uid + '/balance').on('value', (snap) => {
            document.getElementById('balance').innerText = snap.val() || 0;
        });
    } else {
        document.getElementById('auth-box').style.display = 'block';
        document.getElementById('game-lobby').style.display = 'none';
    }
});

// 4. Hàm nạp Pi (gọi SDK Pi Browser)
async function napPi() {
    try {
        const payment = await window.Pi.createPayment({
            amount: 10,
            memo: "Nạp 10 Pi chăm vườn Bonsai 99",
            metadata: { uid: auth.currentUser.uid }
        }, {
            onReadyForServerApproval: (id) => fetch('/api/approve', { method: 'POST', body: JSON.stringify({id}) }),
            onReadyForServerCompletion: (id, txid) => {
                db.ref('users/' + auth.currentUser.uid + '/balance').transaction(c => (c || 0) + 10);
                alert("✅ Đã nạp 10 Pi thành công!");
            }
        });
    } catch (e) { alert("Lỗi: " + e.message); }
}
</script>
</body>
</html>
