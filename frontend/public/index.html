<script>
    // 1. Gán biến Pi ra ngoài để hàm nào cũng thấy
    var Pi = window.Pi;

    // 2. Hàm khởi động hệ thống
    function batDauHeThong() {
      document.getElementById("status").innerText = "🔄 Đang đánh thức SDK...";
      
      try {
        // Khởi tạo trước tất cả mọi thứ
        window.Pi.init({ version: "2.0", sandbox: false });
        console.log("SDK đã thức dậy!");

        // Đợi 1 giây cho chắc rồi mới đòi đăng nhập
        setTimeout(function() {
          document.getElementById("status").innerText = "🔄 Đang tìm ví nghệ nhân...";
          
          window.Pi.authenticate(['username', 'payments'], function(payment) {})
            .then(function(auth) {
              document.getElementById("status").innerText = "✅ Nghệ nhân: " + auth.user.username;
            })
            .catch(function(err) {
              document.getElementById("status").innerText = "❌ Lỗi kết nối: " + err.message;
            });
        }, 1000);

      } catch (e) {
        document.getElementById("status").innerText = "❌ Lỗi khởi tạo: " + e.message;
      }
    }

    // 3. Chạy hệ thống ngay khi load trang
    window.onload = function() {
      if (window.Pi) {
        batDauHeThong();
      } else {
        document.getElementById("status").innerText = "❌ Không tìm thấy SDK. Dùng Pi Browser nha!";
      }
    };

    // 4. Hàm nạp tiền
    function napPi() {
      var status = document.getElementById("status").innerText;
      if (!status.includes("Nghệ nhân")) {
        alert("Chưa hiện tên Nghệ nhân là chưa nạp được đâu Nhi!");
        return;
      }

      window.Pi.createPayment({
        amount: 10,
        memo: "Nap Pi Bonsai 99",
        metadata: { type: "nap" }
      }, {
        onReadyForServerApproval: function(id) { console.log("Duyet: " + id); },
        onReadyForServerCompletion: function(id, tx) { alert("✅ Thành công rồi mậy!"); },
        onCancel: function() { alert("❌ Huỷ nạp"); },
        onError: function(err) { alert("❌ Lỗi: " + err.message); }
      });
    }
  </script>
