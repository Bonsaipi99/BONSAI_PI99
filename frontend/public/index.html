<script>
// 1. Cấu hình Firebase (Phải để TRƯỚC khi gọi lệnh khởi tạo)
const firebaseConfig = {
  apiKey: "AIzaSyA2P3yh0o-Jr2zCDkFxBg4YTrFSTpeS8P0",
  authDomain: "bonsaipi224.firebaseapp.com",
  databaseURL: "https://bonsaipi224-default-rtdb.firebaseio.com",
  projectId: "bonsaipi224",
  storageBucket: "bonsaipi224.firebasestorage.app",
  messagingSenderId: "818801429743",
  appId: "1:818801429743:web:27ed0c854b8be5c8a95f1a"
};

// 2. Khởi tạo (Cách viết chuẩn cho bản 8.10.0 của mầy)
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();

// 3. Hàm Đăng ký
function register() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;
  
  if (!email || !pass) return alert("Nhi ơi, nhập đủ email với mật khẩu đã!");

  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => {
      document.getElementById("msg").innerText = "Đăng ký thành công rồi mậy!";
    })
    .catch(err => {
      document.getElementById("msg").innerText = "Lỗi ĐK: " + err.message;
    });
}

// 4. Hàm Đăng nhập
function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
    .then(() => {
      document.getElementById("msg").innerText = "Đăng nhập OK! Vào vườn thôi!";
    })
    .catch(err => {
      document.getElementById("msg").innerText = "Lỗi ĐN: " + err.message;
    });
}
</script>
