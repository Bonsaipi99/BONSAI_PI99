<!DOCTYPE html>
<html>
<head>
    <title>BONSAI PI 99</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background-color: #002200; color: gold; text-align: center; font-family: sans-serif; padding-top: 100px; }
        .btn { background: gold; padding: 20px; border-radius: 10px; font-weight: bold; cursor: pointer; color: black; display: inline-block; }
    </style>
</head>
<body>
    <h1>🎰 BONSAI PI 99 🎰</h1>
    <div id="status">Đang kết nối ví...</div>
    <br><br>
    <div class="btn" onclick="napPi()">BẤM ĐỂ NẠP 10 PI</div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: false });

        Pi.authenticate(['username', 'payments'], function(payment) {})
          .then(function(auth) {
            document.getElementById('status').innerText = "Chào: " + auth.user.username;
          })
          .catch(function(err) {
            document.getElementById('status').innerText = "Lỗi: " + err.message;
          });

        function napPi() {
            Pi.createPayment({
                amount: 10,
                memo: "Nap Pi vao song Bonsai",
                metadata: { type: "deposit" },
            }, {
                onReadyForServerApproval: function(id) { alert("Dang cho duyet: " + id); },
                onReadyForServerCompletion: function(id, tx) { alert("Thành công!"); },
                onCancel: function(id) { },
                onError: function(err) { alert("Loi: " + err.message); }
            });
        }
    </script>
</body>
</html>
