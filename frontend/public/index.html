<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>BONSAI PI 99</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <!-- Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>

  <style>
    body {
      background: #0b4e3b;
      color: white;
      text-align: center;
      font-family: Arial;
      padding-top: 50px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
    #game { display: none; }
  </style>
</head>
<body>

<h2>🌱 BONSAI PI 99</h2>

<!-- LOGIN -->
<div id="auth">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="register()">Đăng ký</button>
  <button onclick="login()">Đăng nhập</button>
</div>

<!-- GAME -->
<div id="game">
  <p id="user"></p>
  <p>Số dư: <span id="balance">0</span> Pi</p>
  <button onclick="napPi()">Nạp 10 Pi</button>
  <button onclick="logout()">Thoát</button>
</div>

<script>
/* ================== CONFIG ================== */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

/* ================== PI INIT ================== */
Pi.init({ version: "2.0", sandbox: true });

/* ================== REGISTER ================== */
function register() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  auth.createUserWithEmailAndPassword(email, pass)
    .then(res => {
      db.ref("users/" + res.user.uid).set({
        email: email,
        balance: 0
      });
      alert("Đăng ký thành công!");
    })
    .catch(err => alert(err.message));
}

/* ================== LOGIN ================== */
function login() {
  const email = document.getElementById("email").value;
  const pass = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email, pass)
    .catch(err => alert(err.message));
}

/* ================== LOGOUT ================== */
function logout() {
  auth.signOut();
}

/* ================== AUTH STATE ================== */
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("auth").style.display = "none";
    document.getElementById("game").style.display = "block";

    document.getElementById("user").innerText = "Xin chào: " + user.email;

    db.ref("users/" + user.uid + "/balance")
      .on("value", snap => {
        document.getElementById("balance").innerText = snap.val() || 0;
      });

  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("game").style.display = "none";
  }
});

/* ================== PAYMENT ================== */
async function napPi() {
  const user = auth.currentUser;

  if (!user) {
    alert("Chưa đăng nhập!");
    return;
  }

  try {
    await Pi.createPayment({
      amount: 10,
      memo: "Nạp Pi Bonsai",
      metadata: { uid: user.uid }
    }, {
      onReadyForServerApproval: function(paymentId) {
        console.log("Approve:", paymentId);
      },

      onReadyForServerCompletion: function(paymentId, txid) {
        db.ref("users/" + user.uid + "/balance")
          .transaction(v => (v || 0) + 10);

        alert("Nạp Pi thành công!");
      },

      onCancel: function() {
        alert("Đã hủy giao dịch");
      },

      onError: function(err) {
        alert("Lỗi: " + err);
      }
    });

  } catch (e) {
    alert("Crash: " + e.message);
  }
}
</script>

</body>
</html>
