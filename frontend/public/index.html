<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Bonsai Pi</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { background:#111; color:white; text-align:center; }
button { padding:10px; margin:5px; }
</style>
</head>

<body>

<h2>🌱 Bonsai Pi</h2>

<div id="auth">
<input id="email" placeholder="Email"><br><br>
<input id="pass" type="password" placeholder="Password"><br><br>
<button onclick="register()">Đăng ký</button>
<button onclick="login()">Đăng nhập</button>
</div>

<div id="app" style="display:none;">
<p id="user"></p>
<p>Balance: <span id="balance">0</span> Pi</p>
<button onclick="pay()">Nạp 1 Pi</button>
<button onclick="logout()">Đăng xuất</button>
</div>

<script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// 2. Cấu hình chìa khóa (Nhi copy đúng cái apiKey từ Firebase Console dán vô đây)
const firebaseConfig = {
  apiKey: "AIzaSyB-vX_S2_XXXXX_YOUR_KEY", 
  authDomain: "bonsaipi99.firebaseapp.com",
  databaseURL: "https://bonsaipi99-default-rtdb.firebaseio.com",
  projectId: "bonsaipi99",
  storageBucket: "bonsaipi99.firebasestorage.app",
  messagingSenderId: "119041498462",
  appId: "1:119041498462:web:5b35dc57bjeb6b49afb80f"
};

// 3. Khởi tạo hệ thống
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// 4. LỆNH GHI NHỚ: Tự động mở cửa vườn
auth.onAuthStateChanged((user) => {
    const authBox = document.getElementById('auth-box');
    const lobby = document.getElementById('game-lobby');
    
    if (user) {
        // Nếu mầy đã đăng nhập rồi, giấu khung đăng nhập đi
        authBox.style.display = 'none';
        lobby.style.display = 'block';
        document.getElementById('wel-msg').innerText = "Chào nghệ nhân: " + user.email;
        
        // Tự động lấy số dư Pi từ Database hiện lên
        db.ref('users/' + user.uid + '/balance').on('value', (snap) => {
            document.getElementById('balance').innerText = snap.val() || 0;
        });
    } else {
        // Nếu chưa đăng nhập, hiện khung bắt nhập Gmail
        authBox.style.display = 'block';
        lobby.style.display = 'none';
    }
});

// 5. Hàm Đăng ký hội viên
function dangKy() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    auth.createUserWithEmailAndPassword(email, pass)
        .then((userCredential) => {
            // Tạo sẵn cái hũ đựng Pi trong Database
            db.ref('users/' + userCredential.user.uid).set({ email: email, balance: 0 });
            alert("Đã cấp thẻ hội viên cho Nhi!");
        })
        .catch((err) => alert("Lỗi: " + err.message));
}

// 6. Hàm Vào vườn (Đăng nhập)
function dangNhap() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Sai mật khẩu rồi mậy!"));
}

// 7. Hàm Rời vườn (Đăng xuất)
function dangXuat() {
    auth.signOut().then(() => location.reload());
}

// 8. Hàm Nạp 10 Pi (Gọi SDK Pi Browser)
async function napPi() {
    if (!window.Pi) return alert("Mở bằng Pi Browser mới nạp được nha!");
    try {
        const payment = await window.Pi.createPayment({
            amount: 10,
            memo: "Nạp Pi chăm Mai Bonsai 99",
            metadata: { uid: auth.currentUser.uid }
        }, {
            onReadyForServerApproval: (id) => fetch('/api/approve', { method: 'POST', body: JSON.stringify({id}) }),
            onReadyForServerCompletion: (id, txid) => {
                // Nạp xong cộng tiền thẳng vào Database
                db.ref('users/' + auth.currentUser.uid + '/balance').transaction(c => (c || 0) + 10);
                alert("Ngon! Đã nạp xong 10 Pi.");
            }
        });
    } catch (e) { alert("Lỗi nạp: " + e.message); }
}
</script>

</body>
</html>
