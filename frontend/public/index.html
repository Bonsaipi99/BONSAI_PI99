<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BONSAI PI 224</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body { background: #1a2421; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .box { background: #25332e; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #4a7c59; }
        input { display: block; margin: 10px auto; padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #84bd00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        #msg { margin-top: 15px; color: #ffeb3b; }
    </style>
</head>
<body>
    <div class="box">
        <h2>🌳 BONSAI PI 224</h2>
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Mật khẩu">
        <button onclick="login()">ĐĂNG NHẬP</button>
        <button style="background:none; color:#84bd00; border:1px solid #84bd00" onclick="register()">TẠO TÀI KHOẢN</button>
        <p id="msg"></p>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA2P3yh0o-Jr2zCDkFxBg4YTrFSTpeS8P0",
    authDomain: "bonsaipi224.firebaseapp.com",
    databaseURL: "https://bonsaipi224-default-rtdb.firebaseio.com",
    projectId: "bonsaipi224",
    storageBucket: "bonsaipi224.firebasestorage.app",
    messagingSenderId: "818801429743",
    appId: "1:818801429743:web:27ed0c854b8be5c8a95f1a"
};

if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
const auth = firebase.auth();

function login() {
    const e = document.getElementById("email").value;
    const p = document.getElementById("password").value;
    auth.signInWithEmailAndPassword(e, p)
        .then(() => { document.getElementById("msg").innerText = "Đăng nhập thành công!"; })
        .catch(err => { document.getElementById("msg").innerText = "Lỗi: " + err.message; });
}

function register() {
    const e = document.getElementById("email").value;
    const p = document.getElementById("password").value;
    auth.createUserWithEmailAndPassword(e, p)
        .then(() => { document.getElementById("msg").innerText = "Đã tạo tài khoản!"; })
        .catch(err => { document.getElementById("msg").innerText = "Lỗi ĐK: " + err.message; });
}
</script>
</body>
</html>
