<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BONSAI PI 224</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background: #1a2421; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .box { background: #25332e; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #4a7c59; }
        input { display: block; margin: 10px auto; padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #84bd00; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="auth-box" class="box">
        <h2>🌳 BONSAI PI 224</h2>
        <input id="email" placeholder="Email nghệ nhân">
        <input id="password" type="password" placeholder="Mật khẩu">
        <button onclick="login()">ĐĂNG NHẬP</button>
        <button style="background:none; color:#84bd00; border:1px solid #84bd00" onclick="register()">TẠO TÀI KHOẢN</button>
    </div>

    <div id="game-lobby" style="display: none;">
        <h2 style="color: #84bd00;">CHÀO MỪNG NGHỆ NHÂN!</h2>
        <p>Tài khoản: <span id="user-email" style="color: gold;">...</span></p>
        <div style="border: 2px solid #4a7c59; padding: 20px; border-radius: 15px; background: #25332e;">
            <p>Số dư: <span id="balance">0</span> PI</p>
            <button onclick="napPi()" style="background: gold; color: black;">🎁 NẠP 10 PI CHĂM CÂY</button>
        </div>
        <button onclick="logout()" style="background: #f44336; margin-top: 20px;">ĐĂNG XUẤT</button>
    </div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyA2P3yh0o-Jr2zCDkFxBg4YTrFSTpeS8P0",
    authDomain: "bonsaipi224.firebaseapp.com",
    databaseURL: "https://bonsaipi224-default-rtdb.firebaseio.com",
    projectId: "bonsaipi224",
    storageBucket: "bonsaipi224.firebasestorage.app",
    messagingSenderId: "818801429743",
    appId: "1:818801429743:web:27ed0c854b8be5c8a95f1a"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged((user) => {
    if (user) {
        document.getElementById("auth-box").style.display = "none";
        document.getElementById("game-lobby").style.display = "block";
        document.getElementById("user-email").innerText = user.email;
    } else {
        document.getElementById("auth-box").style.display = "inline-block";
        document.getElementById("game-lobby").style.display = "none";
    }
});

function login() {
    const e = document.getElementById("email").value;
    const p = document.getElementById("password").value;
    auth.signInWithEmailAndPassword(e, p).catch(err => alert("Lỗi: " + err.message));
}

function register() {
    const e = document.getElementById("email").value;
    const p = document.getElementById("password").value;
    auth.createUserWithEmailAndPassword(e, p).then(() => alert("Đã tạo acc!")).catch(err => alert(err.message));
}

function logout() { auth.signOut().then(() => location.reload()); }

async function napPi() {
    try {
        if (window.Pi && !window.Pi.initialized) { await Pi.init({ version: "2.0", sandbox: true }); }
        await Pi.createPayment({
            amount: 10, memo: "Nạp 10 Pi", metadata: { uid: auth.currentUser.uid }
        }, {
            onReadyForServerApproval: (id) => console.log("Duyệt..."),
            onReadyForServerCompletion: (id, txid) => {
                let b = document.getElementById("balance");
                b.innerText = parseFloat(b.innerText) + 10;
                alert("Nạp xong!");
            },
            onCancel: (id) => {}, onError: (err) => alert(err.message)
        });
    } catch (e) { alert("Mở bằng Pi Browser trên đt nha!"); }
}
</script>
</body>
</html>
