<!DOCTYPE html>
<html>
<head>
    <title>Cờ Tướng Pi 88</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; }
        .btn-nap { background: #8a2be2; border: none; padding: 15px 30px; color: white; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>CHÀO MỪNG ĐẾN VỚI CỜ TƯỚNG PI 88</h1>
    <div id="user-info">Đang kết nối Pi...</div>
    <br>
    <button class="btn-nap" onclick="napPiSDK()">NẠP 10 PI QUA SDK</button>

    <script>
        // Khởi tạo Pi SDK
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        // Tự động lấy tên người dùng
        Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
          .then(function(auth) {
            document.getElementById('user-info').innerText = "Xin chào: " + auth.user.username;
          });

        function onIncompletePaymentFound(payment) { /* Xử lý thanh toán dở dang */ }

        function napPiSDK() {
            Pi.createPayment({
                amount: 10,
                memo: "Nạp tiền chơi Cờ Tướng Pi 88",
                metadata: { orderId: "DH" + Date.now() },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("Đang chờ Server duyệt...");
                    // Chỗ này Backend của mầy sẽ nhảy vào xác nhận
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    alert("Nạp thành công! TXID: " + txid);
                },
                onCancel: function(paymentId) { console.log("Người dùng đã hủy"); },
                onError: function(error, payment) { console.error(error); }
            });
        }
    </script>
</body>
</html>
