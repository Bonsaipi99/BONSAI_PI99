<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BONSAI PI 224</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <style>
        body { background: #1a2421; color: white; text-align: center; font-family: sans-serif; padding-top: 50px; }
        .box { background: #25332e; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #4a7c59; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        input { display: block; margin: 10px auto; padding: 12px; width: 260px; border-radius: 8px; border: none; outline: none; }
        button { padding: 12px 20px; background: #84bd00; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; color: white; }
        .status-card { border: 2px solid #4a7c59; padding: 20px; border-radius: 15px; background: #1e2b26; margin-top: 15px; }
        #msg { color: #ffeb3b; margin-top: 15px; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="auth-box" class="box">
        <h2 style="color: #84bd00;">🌳 BONSAI PI 224</h2>
        <input id="email" type="email" placeholder="Email nghệ nhân">
        <input id="password" type="password" placeholder="Mật khẩu">
        <button onclick="loginUser()">ĐĂNG NHẬP</button>
        <button style="background:none; color:#84bd00; border:1px solid #84bd00" onclick="registerUser()">TẠO TÀI KHOẢN</button>
        <p id="msg">Đăng nhập để chăm vườn nha Nhi!</p>
    </div>

    <div id="game-lobby" style="display: none;" class="box">
        <h2 style="color: #84bd00;">CHÀO MỪNG NGHỆ NHÂN!</h2>
        <p>Tài khoản: <span id="user-email" style="color: gold; font-weight: bold;">...</span></p>
        
        <div class="status-card">
            <p style="margin: 0;">Số dư hiện tại:</p>
            <p><span id="balance" style="color: #84bd00; font-size: 2em; font-weight: bold;">0</span> <span style="color:gold">PI</span></p>
            <button onclick="napPi()" style="background: gold; color: black; font-size: 1.1em;">🎁 NẠP 10 PI CHĂM VƯỜN</button>
        </div>

        <button onclick="logout()" style="background: #f44336; margin-top: 25px; width: 150px;">ĐĂNG XUẤT</button>
    </div>

<script>
// 2. Cấu hình Firebase của mầy
const firebaseConfig = {
    apiKey: "AIzaSyA2P3yh0o-Jr2zCDkFxBg4YTrFSTpeS8P0",
    authDomain: "bonsaipi224.firebaseapp.com",
    databaseURL: "https://bonsaipi224-default-rtdb.firebaseio.com",
    projectId: "bonsaipi224",
    storageBucket: "bonsaipi224.firebasestorage.app",
    messagingSenderId: "818801429743",
    appId: "1:818801429743:web:27ed0c854b8be5c8a95f1a"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 3. Khởi tạo Pi SDK thầm lặng (Fix lỗi quay chóng mặt)
window.onload = function() {
    if (window.Pi) {
        Pi.init({ version: "2.0", sandbox: true }); 
        console.log("Pi SDK đã sẵn sàng!");
    }
};

// 4. Kiểm tra trạng thái đăng nhập
auth.onAuthStateChanged((user) => {
    const authBox = document.getElementById("auth-box");
    const lobby = document.getElementById("game-lobby");
    if (user) {
        authBox.style.display = "none";
        lobby.style.display = "block";
        document.getElementById("user-email").innerText = user.email;
    } else {
        authBox.style.display = "inline-block";
        lobby.style.display = "none";
    }
});

// 5. Hàm xử lý Đăng nhập / Đăng ký
function loginUser() {
    const e = document.getElementById("email").value;
    const p = document.getElementById("password").value;
    if(!e || !p) return alert("Nhập đủ mail với pass mầy ơi!");
    auth.signInWithEmailAndPassword(e, p).catch(err => alert("Lỗi: " + err.message));
}

function registerUser() {
    const e = document.getElementById("email").value;
    const p = document.getElementById("password").value;
    if(!e || !p) return alert("Nhập đủ mail với pass mới tạo acc được!");
    auth.createUserWithEmailAndPassword(e, p).then(() => alert("Tạo acc xong!")).catch(err => alert(err.message));
}

function logout() { auth.signOut().then(() => location.reload()); }

// 6. Hàm Nạp Pi (Fix lỗi Preparing mãi mãi)
async function napPi() {
    try {
        if (!window.Pi) return alert("Mở bằng Pi Browser trên đt nha Nhi!");

        // Xin quyền thanh toán và mở ví
        const scopes = ['payments'];
        await Pi.authenticate(scopes, (payment) => {
            console.log("Đang xử lý thanh toán tồn đọng...");
        }).then(async (authResult) => {
            
            alert("Đang mở ví Pi... Nhi đợi xíu!");
            
            await Pi.createPayment({
                amount: 10,
                memo: "Nạp 10 Pi chăm vườn 224",
                metadata: { uid: auth.currentUser.uid }
            }, {
                onReadyForServerApproval: (id) => { console.log("Lệnh: " + id); },
                onReadyForServerCompletion: (id, txid) => {
                    let b = document.getElementById("balance");
                    b.innerText = parseFloat(b.innerText) + 10;
                    alert("✅ Nạp xong rồi mầy ơi!");
                },
                onCancel: (id) => { console.log("Hủy."); },
                onError: (err) => { 
                    alert("Lỗi: " + err.message); 
                }
            });
        });
    } catch (e) {
        alert("Ví đang bận hoặc lỗi: " + e.message);
    }
}
</script>
</body>
</html>
