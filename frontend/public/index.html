<script>
        const Pi = window.Pi;
        // Chế độ Sandbox: false vì app mầy đã lên Production
        Pi.init({ version: "2.0", sandbox: false }); 

        // Hàm tự động kết nối khi vừa vào app
        function connectWallet() {
            Pi.authenticate(['username', 'payments'], onIncompletePaymentFound)
              .then(function(auth) {
                document.getElementById('user-info').innerText = "Chào Nghệ nhân: " + auth.user.username;
                console.log("Đã kết nối ví thành công!");
              })
              .catch(function(error) {
                document.getElementById('user-info').innerText = "Lỗi kết nối ví. Vui lòng tải lại!";
                console.error(error);
              });
        }

        // Gọi kết nối ngay khi app load
        connectWallet();

        function onIncompletePaymentFound(payment) {
            // Tự động hoàn tất nếu có giao dịch bị kẹt
            console.log("Tìm thấy giao dịch chưa hoàn tất:", payment);
        }

        function napPiSDK() {
            // Kiểm tra xem đã đăng nhập chưa trước khi cho nạp
            const userInfo = document.getElementById('user-info').innerText;
            if (userInfo.includes("Đang kết nối") || userInfo.includes("Lỗi")) {
                alert("Mầy đợi xíu cho nó hiện tên Nghệ nhân rồi hãy bấm nạp!");
                connectWallet();
                return;
            }

            Pi.createPayment({
                amount: 10,
                memo: "Nạp Pi vào sòng BONSAI PI 99",
                metadata: { type: "casino_deposit" },
            }, {
                onReadyForServerApproval: function(paymentId) {
                    console.log("Giao dịch đang chờ duyệt:", paymentId);
                },
                onReadyForServerCompletion: function(paymentId, txid) {
                    alert("Ting ting! Nạp 10 Pi thành công. Vào sòng thôi Nhi ơi!");
                },
                onCancel: function(paymentId) { console.log("Hủy nạp"); },
                onError: function(error) { alert("Lỗi Pi SDK: " + error.message); }
            });
        }
    </script>
