<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>BONSAI PI 99</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { background: #064e3b; color: gold; text-align: center; font-family: sans-serif; padding-top: 80px; }
    .card { border: 2px solid gold; display: inline-block; padding: 20px; border-radius: 15px; background: rgba(0,0,0,0.2); }
    button { background: gold; color: black; padding: 15px 25px; border-radius: 10px; font-weight: bold; border: none; cursor: pointer; font-size: 18px; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🎰 BONSAI PI 99 🎰</h1>
    <p id="status">🔄 Đang đánh thức SDK...</p>
    <button onclick="napPi()">BẤM ĐỂ NẠP 10 PI</button>
  </div>

  <script>
  // Chạy ngay khi trang vừa load xong
  window.onload = function() {
    // 1. Kiểm tra xem có đang mở trong Pi Browser không
    if (!window.Pi) {
      document.getElementById("status").innerText = "❌ Lỗi: Hãy mở bằng Pi Browser mậy ơi!";
      return;
    }

    const Pi = window.Pi;

    try {
      // 2. KHỞI TẠO SDK TRƯỚC (Dùng bản chạy thật sandbox: false)
      Pi.init({ version: "2.0", sandbox: false });
      console.log("SDK đã thức!");

      // 3. ĐỢI 1 GIÂY CHO CHẮC RỒI MỚI ĐĂNG NHẬP
      setTimeout(function() {
        document.getElementById("status").innerText = "🔄 Đang tìm ví nghệ nhân...";
        
        Pi.authenticate(['username', 'payments'], function(payment) {
          // Xử lý thanh toán dở dang nếu có
        })
        .then(function(auth) {
          // HIỆN TÊN LÀ THÀNH CÔNG
          document.getElementById("status").innerText = "✅ Nghệ nhân: " + auth.user.username;
        })
        .catch(function(err) {
          document.getElementById("status").innerText = "❌ Lỗi kết nối: " + err.message;
        });
      }, 1000);

    } catch (e) {
      document.getElementById("status").innerText = "❌ Crash: " + e.message;
    }
  };

  // 4. HÀM NẠP TIỀN
  function napPi() {
    const statusText = document.getElementById("status").innerText;
    if (!statusText.includes("Nghệ nhân")) {
      alert("Đợi hiện tên Nghệ nhân rồi hãy bấm nạp Nhi ơi!");
      return;
    }

    window.Pi.createPayment({
      amount: 10,
      memo: "Nạp 10 Pi Bonsai 99",
      metadata: { type: "deposit" }
    }, {
      onReadyForServerApproval: function(paymentId) {
        console.log("Đang duyệt lệnh:", paymentId);
        // Lệnh này để báo Server mầy dùng PI_API_KEY duyệt thanh toán
        fetch('/api/approve', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ paymentId: paymentId })
        });
      },
      onReadyForServerCompletion: function(paymentId, txid) {
        alert("✅ Ting Ting! Nạp thành công rồi mậy!");
      },
      onCancel: function() { alert("❌ Mầy hủy lệnh nạp rồi!"); },
      onError: function(err) { alert("❌ Lỗi: " + err.message); }
